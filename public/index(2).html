<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bazzar Urban - متجر الملابس الحضرية</title>
    <style>
        :root {
            --black: #0a0a0a;
            --charcoal: #111111;
            --panel: #141414;
            --red: #e50914;
            --red-glow: #ff1a25;
            --white: #f5f5f5;
            --gray: #888888;
            --border: #222222;
            --light-gray: #aaaaaa;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--black);
            color: var(--white);
            line-height: 1.6;
            overflow-x: hidden;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--black); }
        ::-webkit-scrollbar-thumb { background: var(--red); border-radius: 4px; }

        /* HEADER */
        header {
            background: rgba(10,10,10,0.95);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
            padding: 1.2rem 1rem;
        }
        .header-wrapper {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-size: 1.6rem;
            font-weight: 900;
            color: var(--white);
            display: flex;
            align-items: center;
            gap: 0.8rem;
            letter-spacing: 1px;
        }
        .logo-icon {
            width: 42px; height: 42px;
            background: var(--red);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 900;
            font-size: 1.2rem;
            box-shadow: 0 0 15px rgba(229,9,20,0.4);
        }

        /* HERO */
        .hero {
            background: radial-gradient(circle at center, #1a0505 0%, var(--black) 70%);
            padding: 5rem 1rem;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .hero::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="60" height="60" opacity="0.04"><rect fill="none" stroke="%23e50914" stroke-width="1" x="0" y="0" width="60" height="60"/></svg>');
            background-size: 30px 30px;
            pointer-events: none;
        }
        .hero h1 {
            font-size: clamp(2rem, 5vw, 3.2rem);
            font-weight: 900;
            margin-bottom: 1rem;
            position: relative;
            z-index: 2;
            text-shadow: 0 0 30px rgba(229,9,20,0.3);
        }
        .hero h1 span { color: var(--red); }
        .hero p {
            font-size: 1.2rem;
            color: var(--gray);
            margin-bottom: 1.5rem;
            position: relative;
            z-index: 2;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }
        .hero-badge {
            display: inline-block;
            background: var(--red);
            color: white;
            padding: 0.8rem 1.6rem;
            border-radius: 2px;
            font-weight: 700;
            position: relative;
            z-index: 2;
            box-shadow: 0 0 20px rgba(229,9,20,0.4);
            letter-spacing: 1px;
        }

        /* MAIN */
        .container { max-width: 1200px; margin: 0 auto; padding: 4rem 1rem; }
        .section-title {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .section-title span { font-size: 2rem; }

        .category-filter {
            display: flex;
            gap: 1rem;
            margin-bottom: 2.5rem;
            flex-wrap: wrap;
        }
        .category-btn {
            padding: 0.8rem 1.5rem;
            border: 1px solid var(--border);
            background: var(--panel);
            color: var(--gray);
            border-radius: 4px;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.3s;
            font-size: 0.95rem;
            letter-spacing: 1px;
        }
        .category-btn:hover {
            border-color: var(--red);
            color: var(--red);
            box-shadow: 0 0 15px rgba(229,9,20,0.1);
        }
        .category-btn.active {
            background: var(--red);
            color: white;
            border-color: var(--red);
            box-shadow: 0 0 20px rgba(229,9,20,0.3);
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 2rem;
        }

        .product-card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 4px;
            overflow: hidden;
            transition: all 0.3s;
            cursor: pointer;
            position: relative;
        }
        .product-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 3px;
            background: var(--red);
            transform: scaleX(0);
            transform-origin: right;
            transition: transform 0.3s;
            z-index: 3;
        }
        .product-card:hover::before { transform: scaleX(1); }
        .product-card:hover {
            transform: translateY(-8px);
            border-color: var(--red);
            box-shadow: 0 20px 40px rgba(229,9,20,0.15);
        }

        .product-image {
            width: 100%; aspect-ratio: 1;
            background: linear-gradient(135deg, #1a1a1a 0%, #220505 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            position: relative;
            overflow: hidden;
        }
        .product-image img { width: 100%; height: 100%; object-fit: cover; }
        .product-image::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(to top, var(--panel), transparent 60%);
        }

        .discount-badge {
            position: absolute;
            top: 12px; right: 12px;
            background: var(--red);
            color: white;
            width: 55px; height: 55px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 1rem;
            box-shadow: 0 4px 15px rgba(229,9,20,0.5);
            z-index: 2;
        }

        .product-info { padding: 1.2rem; position: relative; z-index: 2; }
        .product-name { font-weight: 700; font-size: 1rem; margin-bottom: 0.5rem; line-height: 1.4; }
        .product-price { font-size: 1.3rem; font-weight: 800; color: var(--red); margin-bottom: 0.3rem; }
        .product-old-price { font-size: 0.85rem; color: var(--gray); text-decoration: line-through; }

        .no-products {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--gray);
            font-size: 1.1rem;
            border: 1px dashed var(--border);
            border-radius: 4px;
        }

        /* POPUP */
        .popup {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(5px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .popup.show { display: flex; }

        .popup-content {
            background: var(--charcoal);
            border: 1px solid var(--border);
            border-radius: 4px;
            max-width: 500px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }
        .popup-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem;
            border-bottom: 1px solid var(--border);
        }
        .popup-title { font-size: 1.3rem; font-weight: 800; color: var(--white); }
        .popup-close {
            background: none;
            border: none;
            font-size: 1.8rem;
            cursor: pointer;
            color: var(--gray);
            transition: color 0.3s;
        }
        .popup-close:hover { color: var(--red); }

        .popup-body { padding: 1.5rem; }

        .popup-image-container {
            width: 100%;
            border-radius: 4px;
            overflow: hidden;
            background: linear-gradient(135deg, #1a1a1a 0%, #220505 100%);
            margin-bottom: 1.5rem;
            position: relative;
            border: 1px solid var(--border);
        }
        .popup-image-container img { width: 100%; max-height: 300px; object-fit: cover; display: block; }
        .image-nav-btn {
            position: absolute;
            top: 50%; transform: translateY(-50%);
            background: rgba(10,10,10,0.7);
            color: white;
            border: 1px solid var(--border);
            width: 40px; height: 40px;
            border-radius: 50%;
            font-size: 1.3rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            z-index: 10;
        }
        .image-nav-btn:hover { background: var(--red); border-color: var(--red); }
        .image-nav-prev { left: 10px; }
        .image-nav-next { right: 10px; }
        .image-counter {
            position: absolute;
            bottom: 10px; left: 50%; transform: translateX(-50%);
            background: rgba(10,10,10,0.8);
            color: white;
            padding: 0.4rem 0.8rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 700;
            border: 1px solid var(--border);
        }

        .popup-price-section { margin-bottom: 1.5rem; }
        .popup-price { font-size: 1.8rem; font-weight: 800; color: var(--red); }
        .popup-old-price { font-size: 0.95rem; color: var(--gray); text-decoration: line-through; margin-top: 0.3rem; }

        .form-group { margin-bottom: 1.5rem; }
        .form-label { display: block; font-weight: 700; margin-bottom: 0.6rem; color: var(--white); font-size: 0.95rem; }
        .form-input {
            width: 100%;
            padding: 0.9rem;
            border: 1px solid var(--border);
            background: var(--black);
            color: var(--white);
            border-radius: 4px;
            font-size: 1rem;
            transition: all 0.3s;
            font-family: inherit;
        }
        .form-input:focus { outline: none; border-color: var(--red); box-shadow: 0 0 0 3px rgba(229,9,20,0.15); }
        .form-input::placeholder { color: #555; }

        .qty-control { display: flex; align-items: center; gap: 1rem; }
        .qty-btn {
            width: 45px; height: 45px;
            border: 1px solid var(--border);
            background: var(--panel);
            color: var(--white);
            cursor: pointer;
            border-radius: 4px;
            font-weight: 700;
            font-size: 1.2rem;
            transition: all 0.3s;
        }
        .qty-btn:hover { border-color: var(--red); color: var(--red); }
        .qty-display { font-size: 1.2rem; font-weight: 800; min-width: 40px; text-align: center; }

        .total-box {
            background: var(--panel);
            padding: 1.2rem;
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 800;
            font-size: 1.2rem;
            margin-bottom: 1.5rem;
            border-right: 4px solid var(--red);
        }
        .total-box span:last-child { color: var(--red); }

        .submit-btn {
            width: 100%;
            padding: 1.2rem;
            background: var(--red);
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: 800;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .submit-btn:hover { background: var(--red-glow); transform: translateY(-2px); box-shadow: 0 10px 30px rgba(229,9,20,0.3); }
        .submit-btn:active { transform: translateY(0); }

        .success-message {
            display: none;
            position: fixed;
            top: 2rem;
            left: 50%; transform: translateX(-50%);
            background: var(--charcoal);
            color: var(--white);
            padding: 1.5rem 2.5rem;
            border-radius: 4px;
            z-index: 2000;
            font-weight: 700;
            border-top: 4px solid var(--red);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            border: 1px solid var(--border);
            text-align: center;
        }
        .success-message.show { display: block; }

        /* FOOTER */
        footer {
            border-top: 1px solid var(--border);
            padding: 3rem 1rem;
            text-align: center;
            color: var(--gray);
            font-size: 0.9rem;
        }
        footer .logo { justify-content: center; margin-bottom: 1rem; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate {
            opacity: 0;
            animation: fadeUp 0.8s ease forwards;
        }
        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.2s; }
        .delay-3 { animation-delay: 0.3s; }

        @media (max-width: 768px) {
            .products-grid { grid-template-columns: repeat(2, 1fr); gap: 1rem; }
            .hero h1 { font-size: 1.8rem; }
            .section-title { font-size: 1.5rem; }
            .popup-content { max-width: 95%; }
        }
    </style>
</head>
<body>

<!-- HEADER -->
<header>
    <div class="header-wrapper">
        <div class="logo">
            <div class="logo-icon">B</div>
            <span>Bazzar Urban</span>
        </div>
    </div>
</header>

<!-- HERO -->
<section class="hero">
    <h1 class="animate">🛍️ منتجات <span>عالية الجودة</span></h1>
    <p class="animate delay-1">أحدث تصاميم الستريتويار بأفضل الأسعار</p>
    <div class="hero-badge animate delay-2">🔥 خصومات تصل إلى 50%</div>
</section>

<!-- MAIN CONTENT -->
<div class="container">
    <div class="section-title animate">
        <span>❤️</span>
        منتجاتنا المتميزة
    </div>

    <div class="category-filter animate delay-1" id="categoryFilter"></div>

    <div class="products-grid" id="productsGrid"></div>
    <div id="noProducts" class="no-products" style="display: none;">📭 لا توجد منتجات في هذا التصنيف</div>
</div>

<!-- PRODUCT POPUP -->
<div class="popup" id="popup">
    <div class="popup-content">
        <div class="popup-header">
            <div class="popup-title" id="popupTitle"></div>
            <button class="popup-close" onclick="closePopup()">✕</button>
        </div>

        <div class="popup-body">
            <div class="popup-image-container" id="imageContainer">
                <img id="currentImage" src="" alt="صورة المنتج">
                <button class="image-nav-btn image-nav-prev" id="prevImageBtn" onclick="previousImage()" style="display: none;">❮</button>
                <button class="image-nav-btn image-nav-next" id="nextImageBtn" onclick="nextImage()" style="display: none;">❯</button>
                <div class="image-counter" id="imageCounter" style="display: none;"></div>
            </div>

            <div class="popup-price-section">
                <div class="popup-price" id="popupPrice"></div>
                <div class="popup-old-price" id="popupOldPrice"></div>
            </div>

            <div class="form-group">
                <label class="form-label">الاسم</label>
                <input type="text" class="form-input" id="customerName" placeholder="أدخل اسمك الكامل">
            </div>

            <div class="form-group">
                <label class="form-label">رقم الجوال</label>
                <input type="tel" class="form-input" id="customerPhone" placeholder="مثال: 0790123456">
            </div>

            <div class="form-group">
                <label class="form-label">العنوان</label>
                <input type="text" class="form-input" id="customerAddress" placeholder="أدخل عنوانك كاملاً">
            </div>

            <div class="form-group">
                <label class="form-label">الحجم</label>
                <input type="text" class="form-input" id="productSize" placeholder="مثال: 43 أو XL أو M">
            </div>

            <div class="form-group">
                <label class="form-label">الكمية</label>
                <div class="qty-control">
                    <button class="qty-btn" onclick="decreaseQty()">−</button>
                    <div class="qty-display" id="qtyDisplay">1</div>
                    <button class="qty-btn" onclick="increaseQty()">+</button>
                </div>
            </div>

            <div class="total-box">
                <span>الإجمالي:</span>
                <span id="totalPrice">0 DZD</span>
            </div>

            <button class="submit-btn" onclick="submitOrder()">✅ تأكيد الطلب</button>
        </div>
    </div>
</div>

<!-- SUCCESS MESSAGE -->
<div class="success-message" id="successMessage">
    ✅ تم استقبال طلبك بنجاح! شكراً لاختيارك Bazzar Urban
</div>

<!-- FOOTER -->
<footer>
    <div class="logo">
        <div class="logo-icon">B</div>
        <span>Bazzar Urban</span>
    </div>
    <p>© 2024 Bazzar Urban. جميع الحقوق محفوظة 🛍️</p>
</footer>

<script>
    let products = [];
    let currentProduct = null;
    let currentQty = 1;
    let currentCategory = 'الكل';
    let currentImageIndex = 0;
    let currentProductImages = [];

    function displayCurrentImage() {
        if (currentProductImages.length === 0) {
            document.getElementById('currentImage').src = '';
            document.getElementById('prevImageBtn').style.display = 'none';
            document.getElementById('nextImageBtn').style.display = 'none';
            document.getElementById('imageCounter').style.display = 'none';
            return;
        }

        document.getElementById('currentImage').src = currentProductImages[currentImageIndex];

        if (currentProductImages.length > 1) {
            document.getElementById('prevImageBtn').style.display = 'flex';
            document.getElementById('nextImageBtn').style.display = 'flex';
            document.getElementById('imageCounter').style.display = 'block';
            document.getElementById('imageCounter').textContent = `${currentImageIndex + 1} / ${currentProductImages.length}`;
        } else {
            document.getElementById('prevImageBtn').style.display = 'none';
            document.getElementById('nextImageBtn').style.display = 'none';
            document.getElementById('imageCounter').style.display = 'none';
        }
    }

    function nextImage() {
        currentImageIndex = (currentImageIndex + 1) % currentProductImages.length;
        displayCurrentImage();
    }

    function previousImage() {
        currentImageIndex = (currentImageIndex - 1 + currentProductImages.length) % currentProductImages.length;
        displayCurrentImage();
    }

    async function loadProducts() {
        try {
            const res = await fetch('/api/products');
            products = await res.json();
            loadCategories();
            displayProducts();
        } catch (e) {
            console.error('Error loading products:', e);
        }
    }

    function loadCategories() {
        const categories = ['الكل', ...new Set(products.map(p => p.category || 'بدون تصنيف'))];
        let html = '';
        categories.forEach(cat => {
            html += `<button class="category-btn ${cat === 'الكل' ? 'active' : ''}" onclick="filterCategory('${cat}')">${cat}</button>`;
        });
        document.getElementById('categoryFilter').innerHTML = html;
    }

    function filterCategory(category) {
        currentCategory = category;
        document.querySelectorAll('.category-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
        displayProducts();
    }

    function displayProducts() {
        let filtered = products;
        if (currentCategory !== 'الكل') {
            filtered = products.filter(p => (p.category || 'بدون تصنيف') === currentCategory);
        }

        if (filtered.length === 0) {
            document.getElementById('productsGrid').innerHTML = '';
            document.getElementById('noProducts').style.display = 'block';
            return;
        }

        document.getElementById('noProducts').style.display = 'none';
        let html = '';
        filtered.forEach((p, idx) => {
            const imageUrl = p.images && p.images[0] ? p.images[0] : null;
            const delay = idx % 4;
            html += `
                <div class="product-card animate delay-${delay}" onclick="openPopup(${p.id})">
                    <div class="product-image">
                        ${imageUrl ? `<img src="${imageUrl}" alt="${p.name}">` : '📦'}
                        ${p.discount > 0 ? `<div class="discount-badge">-${p.discount}%</div>` : ''}
                    </div>
                    <div class="product-info">
                        <div class="product-name">${p.name}</div>
                        <div class="product-price">${p.price} DZD</div>
                        <div class="product-old-price">${p.old} DZD</div>
                    </div>
                </div>
            `;
        });
        document.getElementById('productsGrid').innerHTML = html;
    }

    function openPopup(id) {
        currentProduct = products.find(p => p.id === id);
        currentQty = 1;
        currentImageIndex = 0;
        currentProductImages = (currentProduct.images && currentProduct.images.length > 0) ? currentProduct.images : [];

        document.getElementById('popupTitle').textContent = currentProduct.name;
        document.getElementById('popupPrice').textContent = currentProduct.price + ' DZD';
        document.getElementById('popupOldPrice').textContent = currentProduct.old + ' DZD';
        document.getElementById('qtyDisplay').textContent = '1';
        document.getElementById('customerName').value = '';
        document.getElementById('customerPhone').value = '';
        document.getElementById('customerAddress').value = '';
        document.getElementById('productSize').value = '';
        updateTotal();

        displayCurrentImage();
        document.getElementById('popup').classList.add('show');
    }

    function closePopup() {
        document.getElementById('popup').classList.remove('show');
    }

    function increaseQty() {
        currentQty++;
        document.getElementById('qtyDisplay').textContent = currentQty;
        updateTotal();
    }

    function decreaseQty() {
        if (currentQty > 1) {
            currentQty--;
            document.getElementById('qtyDisplay').textContent = currentQty;
            updateTotal();
        }
    }

    function updateTotal() {
        const total = currentProduct.price * currentQty;
        document.getElementById('totalPrice').textContent = total + ' DZD';
    }

    async function submitOrder() {
        const name = document.getElementById('customerName').value.trim();
        const phone = document.getElementById('customerPhone').value.trim();
        const address = document.getElementById('customerAddress').value.trim();
        const size = document.getElementById('productSize').value.trim();

        if (!name || !phone || !address || !size) {
            alert('⚠️ الرجاء ملء جميع الحقول');
            return;
        }

        try {
            const res = await fetch('/api/orders', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    product: currentProduct.name,
                    price: currentProduct.price * currentQty,
                    size,
                    qty: currentQty,
                    customer: name,
                    phone,
                    address,
                    date: new Date().toLocaleDateString('ar-DZ')
                })
            });

            if (res.ok) {
                document.getElementById('successMessage').classList.add('show');
                setTimeout(() => {
                    document.getElementById('successMessage').classList.remove('show');
                }, 3000);
                closePopup();
            } else {
                alert('❌ حدث خطأ في الطلب');
            }
        } catch (e) {
            alert('❌ خطأ في الاتصال');
            console.error(e);
        }
    }

    loadProducts();

    document.getElementById('popup').addEventListener('click', (e) => {
        if (e.target.id === 'popup') closePopup();
    });
